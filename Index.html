<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14181D">
<title>BurnLog</title>
<link rel="apple-touch-icon" href="data:,">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap');
:root{
  --bg:#14181D; --panel:#1C2229; --line:#2A323C; --ink:#E8ECEF; --dim:#8A97A3;
  --ember:#E8590C; --deficit:#3FB960; --surplus:#E0533D; --neutral:#C9A227;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:44px}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px}
.brand{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;text-transform:uppercase;letter-spacing:.02em}
.brand em{color:var(--ember);font-style:normal}
.sub{font-size:12px;color:var(--dim)}
.tabs{display:flex;gap:6px}
.tabs button{background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;font-weight:600;font-family:'Barlow',sans-serif}
.tabs button.on{background:var(--line);color:var(--ink)}
.hdr{display:flex;justify-content:space-between;align-items:baseline}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
.lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;display:block;font-weight:600}
input,select{background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:10px 12px;font-size:16px;width:100%;font-family:'Barlow',sans-serif;outline:none}
.btn{width:100%;background:var(--ember);color:#fff;border:none;border-radius:6px;padding:12px 0;font-size:15px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;letter-spacing:.03em}
.btn2{background:var(--line);color:var(--ink);border:none;border-radius:6px;padding:0 18px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}
.datenav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.datenav button{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;padding:6px}
.datenav .d{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;letter-spacing:.03em}
.balance{text-align:center;margin-bottom:6px}
.balance .num{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:700;line-height:1}
.balance .tag{font-size:13px;color:var(--dim);margin-left:8px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.gauge{position:relative;height:14px;border-radius:7px;overflow:hidden;background:linear-gradient(90deg,var(--deficit),var(--neutral) 50%,var(--surplus))}
.gauge .zero{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--bg)}
.gauge .needle{position:absolute;top:-2px;bottom:-2px;width:4px;border-radius:2px;background:var(--ink);transition:left .4s ease;box-shadow:0 0 6px rgba(0,0,0,.6)}
.gscale{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:.06em}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.stat{text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px}
.stat .v{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:600}
.stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}
.macros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.macros .card{margin-bottom:0;text-align:center;padding:10px 6px}
.macros .v{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:600}
.macros .u{font-size:13px;color:var(--dim)}
.formgrid{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:6px;margin:8px 0 10px}
.entry{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.entry .n{font-size:15px;font-weight:500}
.entry .m{font-size:12px;color:var(--dim)}
.entry .c{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600}
.entry .x{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:2px 6px}
.empty{text-align:center;color:var(--dim);font-size:14px;padding:18px 0}
.row{display:flex;gap:8px}
.wrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
.wrow .d{color:var(--dim)}
.wrow .v{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px}
.sexbtns{display:flex;gap:8px}
.sexbtns button{flex:1;padding:10px 0;border-radius:6px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--dim);font-weight:600;font-family:'Barlow',sans-serif}
.sexbtns button.on{border-color:var(--ember);background:rgba(232,89,12,.12);color:var(--ink)}
.bmrbox{background:var(--bg);border-radius:8px;padding:12px;text-align:center;margin-top:4px}
.bmrbox .v{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;color:var(--ember)}
h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.set{margin-bottom:12px}
svg{width:100%;height:auto}
.hide{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="brand">Burn<em>Log</em></div>
      <div class="sub" id="subline"></div>
    </div>
    <div class="tabs">
      <button id="t-log" class="on" onclick="setView('log')">Log</button>
      <button id="t-trend" onclick="setView('trend')">Trend</button>
      <button id="t-settings" onclick="setView('settings')">Setup</button>
    </div>
  </div>
</div>

<div class="wrap" id="v-log" style="padding-top:0">
  <div class="datenav">
    <button onclick="shiftDay(-1)">‹</button>
    <div class="d" id="datelabel"></div>
    <button id="fwd" onclick="shiftDay(1)">›</button>
  </div>

  <div class="card">
    <div class="balance"><span class="num" id="balnum">0</span><span class="tag" id="baltag">even</span></div>
    <div class="gauge"><div class="zero"></div><div class="needle" id="needle" style="left:calc(50% - 2px)"></div></div>
    <div class="gscale"><span>-1000</span><span>0</span><span>+1000</span></div>
    <div class="grid3">
      <div class="stat"><div class="v" id="s-eaten">0</div><div class="l">Eaten</div></div>
      <div class="stat"><div class="v" id="s-bmr" style="color:var(--dim)">0</div><div class="l">BMR</div></div>
      <div class="stat"><div class="v" id="s-burn" style="color:var(--ember)">0</div><div class="l">Burned</div></div>
    </div>
  </div>

  <div class="macros">
    <div class="card"><div class="v"><span id="m-p">0</span><span class="u">g</span></div><div class="stat l" style="background:none;padding:0">Protein</div></div>
    <div class="card"><div class="v"><span id="m-c">0</span><span class="u">g</span></div><div class="stat l" style="background:none;padding:0">Carbs</div></div>
    <div class="card"><div class="v"><span id="m-f">0</span><span class="u">g</span></div><div class="stat l" style="background:none;padding:0">Fat</div></div>
  </div>

  <div class="card">
    <label class="lbl">Calories burned (runs, lifting, calls)</label>
    <input type="number" inputmode="numeric" id="burned" placeholder="0" onchange="saveBurned()">
  </div>

  <div class="card">
    <label class="lbl">Add food</label>
    <input id="f-name" placeholder="What did you eat?">
    <div class="formgrid">
      <input type="number" inputmode="numeric" id="f-cal" placeholder="Cal">
      <input type="number" inputmode="numeric" id="f-p" placeholder="P (g)">
      <input type="number" inputmode="numeric" id="f-c" placeholder="C (g)">
      <input type="number" inputmode="numeric" id="f-f" placeholder="F (g)">
    </div>
    <button class="btn" onclick="addEntry()">Log it</button>
  </div>

  <div id="entries"></div>

  <div class="card" style="margin-top:14px">
    <label class="lbl">Log today's weight (lbs)</label>
    <div class="row">
      <input type="number" inputmode="decimal" id="w-input">
      <button class="btn2" onclick="logWeight()">Save</button>
    </div>
  </div>
</div>

<div class="wrap hide" id="v-trend" style="padding-top:0">
  <div class="card">
    <h2>Weight trend</h2>
    <div id="chartbox" class="empty">Log your weight on at least two days and the trend line will show here.</div>
    <div id="wlist"></div>
  </div>
</div>

<div class="wrap hide" id="v-settings" style="padding-top:0">
  <div class="card">
    <h2>Your numbers</h2>
    <div class="sub" style="margin-bottom:14px">BMR uses the Mifflin-St Jeor equation. Data saves on this device in your browser.</div>
    <div class="set"><label class="lbl">Current weight (lbs)</label><input type="number" inputmode="decimal" id="set-weight" onchange="saveSettings()"></div>
    <div class="set"><label class="lbl">Goal weight (lbs)</label><input type="number" inputmode="decimal" id="set-goal" onchange="saveSettings()"></div>
    <div class="set"><label class="lbl">Height (inches)</label><input type="number" inputmode="decimal" id="set-height" onchange="saveSettings()"></div>
    <div class="set"><label class="lbl">Age</label><input type="number" inputmode="numeric" id="set-age" onchange="saveSettings()"></div>
    <div class="set"><label class="lbl">Sex (for BMR)</label>
      <div class="sexbtns">
        <button id="sex-male" onclick="setSex('male')">Male</button>
        <button id="sex-female" onclick="setSex('female')">Female</button>
      </div>
    </div>
    <div class="bmrbox">
      <div class="lbl" style="margin:0">Calculated BMR</div>
      <div class="v" id="bmrshow">0</div>
      <div class="sub">calories/day at rest</div>
    </div>
  </div>
</div>

<script>
// ---------- state ----------
const LS = window.localStorage;
let settings = JSON.parse(LS.getItem('bl:settings') || 'null') ||
  { weight:180, goalWeight:160, heightIn:70, age:30, sex:'male' };
let weights = JSON.parse(LS.getItem('bl:weights') || '[]');
let dateKey = today();
let day = loadDay(dateKey);

function today(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function shiftKey(k,n){ const [y,m,d]=k.split('-').map(Number); const dt=new Date(y,m-1,d+n); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function pretty(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function loadDay(k){ return JSON.parse(LS.getItem('bl:day:'+k) || 'null') || {entries:[],burned:''}; }
function persistDay(){ LS.setItem('bl:day:'+dateKey, JSON.stringify(day)); }
function bmr(){ const kg=settings.weight*0.4536, cm=settings.heightIn*2.54;
  const b=10*kg+6.25*cm-5*settings.age; return Math.round(settings.sex==='male'?b+5:b-161); }

// ---------- actions ----------
function shiftDay(n){
  const next = shiftKey(dateKey,n);
  if(next > today()) return;
  dateKey = next; day = loadDay(dateKey); render();
}
function saveBurned(){ day.burned = document.getElementById('burned').value; persistDay(); render(); }
function addEntry(){
  const name=document.getElementById('f-name').value.trim();
  const cal=parseInt(document.getElementById('f-cal').value);
  if(!name||!cal) return;
  day.entries.push({ id:Date.now(), name, cal,
    p:parseInt(document.getElementById('f-p').value)||0,
    c:parseInt(document.getElementById('f-c').value)||0,
    f:parseInt(document.getElementById('f-f').value)||0 });
  persistDay();
  ['f-name','f-cal','f-p','f-c','f-f'].forEach(id=>document.getElementById(id).value='');
  render();
}
function removeEntry(id){ day.entries = day.entries.filter(e=>e.id!==id); persistDay(); render(); }
function logWeight(){
  const v=parseFloat(document.getElementById('w-input').value);
  if(!v||v<60||v>500) return;
  weights = weights.filter(w=>w.date!==dateKey).concat([{date:dateKey,lbs:v}]).sort((a,b)=>a.date.localeCompare(b.date));
  LS.setItem('bl:weights', JSON.stringify(weights));
  settings.weight=v; LS.setItem('bl:settings', JSON.stringify(settings));
  document.getElementById('w-input').value='';
  render();
}
function saveSettings(){
  settings.weight=parseFloat(document.getElementById('set-weight').value)||settings.weight;
  settings.goalWeight=parseFloat(document.getElementById('set-goal').value)||settings.goalWeight;
  settings.heightIn=parseFloat(document.getElementById('set-height').value)||settings.heightIn;
  settings.age=parseInt(document.getElementById('set-age').value)||settings.age;
  LS.setItem('bl:settings', JSON.stringify(settings));
  render();
}
function setSex(s){ settings.sex=s; LS.setItem('bl:settings', JSON.stringify(settings)); render(); }
function setView(v){
  ['log','trend','settings'].forEach(x=>{
    document.getElementById('v-'+x).classList.toggle('hide', x!==v);
    document.getElementById('t-'+x).classList.toggle('on', x===v);
  });
  render();
}

// ---------- render ----------
function render(){
  const latest = weights.length ? weights[weights.length-1].lbs : settings.weight;
  document.getElementById('subline').textContent =
    latest+' lbs · '+(latest-settings.goalWeight).toFixed(1)+' to goal ('+settings.goalWeight+')';
  document.getElementById('datelabel').textContent = (dateKey===today()?'Today — ':'')+pretty(dateKey);
  document.getElementById('fwd').style.color = dateKey===today() ? 'var(--line)' : 'var(--dim)';

  const t = day.entries.reduce((a,e)=>({cal:a.cal+e.cal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{cal:0,p:0,c:0,f:0});
  const burned = parseInt(day.burned)||0;
  const B = bmr();
  const bal = t.cal - (B + burned);
  const pct = Math.max(-1, Math.min(1, bal/1000));

  const num=document.getElementById('balnum');
  num.textContent = (bal>0?'+':'')+bal.toLocaleString();
  num.style.color = bal<-50?'var(--deficit)':bal>50?'var(--surplus)':'var(--neutral)';
  document.getElementById('baltag').textContent = bal<-50?'deficit':bal>50?'surplus':'even';
  document.getElementById('needle').style.left = 'calc('+(50+pct*50)+'% - 2px)';
  document.getElementById('s-eaten').textContent = t.cal.toLocaleString();
  document.getElementById('s-bmr').textContent = B.toLocaleString();
  document.getElementById('s-burn').textContent = burned.toLocaleString();
  document.getElementById('m-p').textContent=t.p;
  document.getElementById('m-c').textContent=t.c;
  document.getElementById('m-f').textContent=t.f;
  document.getElementById('burned').value = day.burned;

  document.getElementById('entries').innerHTML = day.entries.length===0
    ? '<div class="empty">Nothing logged for this day yet.</div>'
    : day.entries.map(e=>
      '<div class="entry"><div><div class="n">'+esc(e.name)+'</div><div class="m">P '+e.p+' · C '+e.c+' · F '+e.f+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:10px"><div class="c">'+e.cal+'</div>'+
      '<button class="x" onclick="removeEntry('+e.id+')">×</button></div></div>').join('');

  // settings fields
  document.getElementById('set-weight').value=settings.weight;
  document.getElementById('set-goal').value=settings.goalWeight;
  document.getElementById('set-height').value=settings.heightIn;
  document.getElementById('set-age').value=settings.age;
  document.getElementById('sex-male').classList.toggle('on',settings.sex==='male');
  document.getElementById('sex-female').classList.toggle('on',settings.sex==='female');
  document.getElementById('bmrshow').textContent=B;

  // trend
  const box=document.getElementById('chartbox');
  if(weights.length>=2){ box.className=''; box.innerHTML=chart(); }
  else { box.className='empty'; box.textContent='Log your weight on at least two days and the trend line will show here.'; }
  document.getElementById('wlist').innerHTML = [...weights].reverse().slice(0,14).map(w=>
    '<div class="wrow"><span class="d">'+pretty(w.date)+'</span><span class="v">'+w.lbs+' lbs</span></div>').join('');
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function chart(){
  const W=480,H=160,pad=28,goal=settings.goalWeight;
  const vals=weights.map(w=>w.lbs);
  const min=Math.min(...vals,goal)-2, max=Math.max(...vals)+2;
  const x=i=>pad+(i/Math.max(1,weights.length-1))*(W-pad*2);
  const y=v=>H-pad-((v-min)/(max-min))*(H-pad*2);
  const path=weights.map((w,i)=>(i===0?'M':'L')+x(i)+','+y(w.lbs)).join(' ');
  const dots=weights.map((w,i)=>'<circle cx="'+x(i)+'" cy="'+y(w.lbs)+'" r="3.5" fill="#E8590C"/>').join('');
  const last=weights[weights.length-1];
  return '<svg viewBox="0 0 '+W+' '+H+'">'+
    '<line x1="'+pad+'" x2="'+(W-pad)+'" y1="'+y(goal)+'" y2="'+y(goal)+'" stroke="#3FB960" stroke-dasharray="5 5" stroke-width="1.5"/>'+
    '<text x="'+(W-pad)+'" y="'+(y(goal)-6)+'" fill="#3FB960" font-size="11" text-anchor="end">goal '+goal+'</text>'+
    '<path d="'+path+'" fill="none" stroke="#E8590C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+dots+
    '<text x="'+x(weights.length-1)+'" y="'+(y(last.lbs)-8)+'" fill="#E8ECEF" font-size="12" font-weight="600" text-anchor="end">'+last.lbs+'</text></svg>';
}
render();
</script>
</body>
</html>
